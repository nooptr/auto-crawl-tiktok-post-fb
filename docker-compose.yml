x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:15-alpine
    container_name: social_db
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: social_auto
    ports:
      - "5432:5432"
    volumes:
      - ./database:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: social_backend
    env_file:
      - ./backend/runtime.env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: always
    logging: *default-logging
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./videos_storage:/app/downloads
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db/social_auto
      - DOWNLOAD_DIR=/app/downloads
      - ADMIN_PASSWORD=admin123
      - DEFAULT_ADMIN_USERNAME=admin
      - DEFAULT_ADMIN_DISPLAY_NAME=Quản trị viên
      - JWT_SECRET=
      - TOKEN_ENCRYPTION_SECRET=
      - AUTH_TOKEN_EXPIRE_MINUTES=480
      - CORS_ALLOW_ORIGINS=http://localhost:5173
      - PASSWORD_MIN_LENGTH=8
      - SCHEDULER_INTERVAL_MINUTES=1
      - TASK_QUEUE_POLL_SECONDS=5
      - WORKER_STALE_SECONDS=30
      - WORKER_BATCH_SIZE=3
      - SCHEDULER_ENABLED=false
      - AUTO_CREATE_SCHEMA=false
      - BACKGROUND_JOBS_MODE=dedicated-worker
      - APP_ROLE=api
      - LOG_LEVEL=INFO

  worker:
    build: ./backend
    container_name: social_worker
    env_file:
      - ./backend/runtime.env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: always
    logging: *default-logging
    command: ["sh", "-c", "alembic upgrade head && python -m app.worker.run"]
    volumes:
      - ./backend:/app
      - ./videos_storage:/app/downloads
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db/social_auto
      - DOWNLOAD_DIR=/app/downloads
      - ADMIN_PASSWORD=admin123
      - DEFAULT_ADMIN_USERNAME=admin
      - DEFAULT_ADMIN_DISPLAY_NAME=Quản trị viên
      - JWT_SECRET=
      - TOKEN_ENCRYPTION_SECRET=
      - AUTH_TOKEN_EXPIRE_MINUTES=480
      - CORS_ALLOW_ORIGINS=http://localhost:5173
      - PASSWORD_MIN_LENGTH=8
      - SCHEDULER_INTERVAL_MINUTES=1
      - TASK_QUEUE_POLL_SECONDS=5
      - WORKER_STALE_SECONDS=30
      - WORKER_BATCH_SIZE=3
      - SCHEDULER_ENABLED=true
      - AUTO_CREATE_SCHEMA=false
      - BACKGROUND_JOBS_MODE=dedicated-worker
      - APP_ROLE=worker
      - LOG_LEVEL=INFO

  frontend:
    build: ./frontend
    container_name: social_frontend
    restart: always
    logging: *default-logging
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: social_tunnel
    restart: always
    logging: *default-logging
    env_file:
      - ./backend/runtime.env
    command: tunnel --no-autoupdate run
    depends_on:
      backend:
        condition: service_started
