name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Cài dependencies backend
        run: pip install -r requirements.txt
      - name: Kiểm tra compile backend
        run: python -m compileall app alembic
      - name: Chạy test backend
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Cài dependencies frontend
        run: npm ci
      - name: Kiểm tra lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
